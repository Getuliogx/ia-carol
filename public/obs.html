<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Live Bot - OBS</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="obs-body">
  <div id="audioUnlock" class="audio-unlock">Clique aqui no Interagir do OBS para ativar o áudio</div>
  <div class="obs-wrap">
    <div class="avatar" id="avatar">
      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth" id="mouth"></div>
      </div>
      <div class="body2d"></div>
    </div>
    <div class="bubble" id="bubble">Aguardando chat...</div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
